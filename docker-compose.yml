version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: servicedesk-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_password
      POSTGRES_DB: service_desk
    ports:
      - "5433:5432" # Map container port 5432 to host port 5433 to align with local environment settings
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d service_desk"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: servicedesk-app
    restart: always
    ports:
      - "3000:3000" # Map container port 3000 to host port 3000
    environment:
      DATABASE_URL: "postgresql://postgres:postgres_password@db:5432/service_desk?schema=public"
      NEXTAUTH_SECRET: "super-secret-dev-key-change-in-production-2024"
      NEXTAUTH_URL: "http://localhost:3000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
